<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theremin - 手势交互</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    margin-top: 16px;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #7fdbca;
  }
  .container {
    position: relative;
    margin-top: 12px;
    border: 2px solid #1a3a3a;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(127, 219, 202, 0.1);
  }
  video, canvas {
    display: block;
    width: 640px;
    height: 480px;
  }
  video { display: none; }
  canvas { background: #000; }
  .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    pointer-events: none;
  }
  .info {
    font-size: 14px;
    font-family: 'Courier New', monospace;
  }
  .info-left { color: #ff79c6; }
  .info-right { color: #8be9fd; }
  #startBtn {
    margin-top: 16px;
    padding: 12px 48px;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: transparent;
    color: #7fdbca;
    border: 1px solid #7fdbca;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
  }
  #startBtn:hover {
    background: #7fdbca;
    color: #0a0a0f;
  }
  #startBtn:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .hint {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
    text-align: center;
    line-height: 1.8;
  }
  #status {
    margin-top: 8px;
    font-size: 13px;
    color: #ff7979;
    min-height: 20px;
  }
</style>
</head>
<body>

<h1>Theremin</h1>

<div class="container">
  <video id="video" playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div class="overlay">
    <div class="info info-left" id="leftInfo">左手: --</div>
    <div class="info info-right" id="rightInfo">右手: --</div>
  </div>
</div>

<button id="startBtn">开始演奏</button>
<div class="hint">
  右手上下移动控制音高 · 左手上下移动控制音量 · 移开双手静音
</div>
<div id="status"></div>

<script type="module">
import { HandLandmarker, FilesetResolver, DrawingUtils } from
  "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const leftInfo = document.getElementById('leftInfo');
const rightInfo = document.getElementById('rightInfo');
const statusEl = document.getElementById('status');
const drawingUtils = new DrawingUtils(ctx);

let audioCtx, oscillator, gainNode;
const SMOOTH = 0.15;
let currentFreq = 440;
let currentGain = 0;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  oscillator = audioCtx.createOscillator();
  gainNode = audioCtx.createGain();
  oscillator.type = 'sine';
  oscillator.frequency.value = 440;
  gainNode.gain.value = 0;
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
}

function mapRange(value, inMin, inMax, outMin, outMax) {
  return outMin + (value - inMin) * (outMax - outMin) / (inMax - inMin);
}

function clamp(val, min, max) {
  return Math.max(min, Math.min(max, val));
}

function smooth(current, target, factor) {
  return current + (target - current) * factor;
}

let handLandmarker = null;

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = '加载中...';

  try {
    statusEl.textContent = '正在加载模型...';

    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
    );

    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2
    });

    statusEl.textContent = '正在启动摄像头...';

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    video.srcObject = stream;
    await video.play();

    initAudio();
    statusEl.textContent = '';
    startBtn.textContent = '演奏中...';

    let lastTime = -1;

    function detect() {
      if (video.currentTime === lastTime) {
        requestAnimationFrame(detect);
        return;
      }
      lastTime = video.currentTime;

      const results = handLandmarker.detectForVideo(video, performance.now());

      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // Mirror the video
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      ctx.restore();

      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      let leftY = null;
      let rightY = null;

      if (results.landmarks && results.handedness) {
        for (let i = 0; i < results.landmarks.length; i++) {
          const landmarks = results.landmarks[i];
          const category = results.handedness[i][0];
          // handedness[0].categoryName: "Left" or "Right"
          // This is from the model's perspective (mirrored).
          // When display is mirrored, model's "Right" = user's right hand.
          const label = category.categoryName;

          // Draw skeleton (mirrored)
          ctx.save();
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);

          const color = label === 'Right'
            ? 'rgba(139, 233, 253, 0.8)'
            : 'rgba(255, 121, 198, 0.8)';

          drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, {
            color: color, lineWidth: 2
          });
          drawingUtils.drawLandmarks(landmarks, {
            color: color, lineWidth: 1, radius: 3
          });

          // Highlight index fingertip
          const tip = landmarks[8];
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(tip.x * canvas.width, tip.y * canvas.height, 10, 0, 2 * Math.PI);
          ctx.stroke();

          ctx.restore();

          if (label === 'Right') {
            rightY = landmarks[8].y;
          } else {
            leftY = landmarks[8].y;
          }
        }
      }

      // Audio control
      if (audioCtx) {
        const now = audioCtx.currentTime;
        const rampTime = 0.08;

        if (rightY !== null) {
          const targetFreq = mapRange(rightY, 1, 0, 200, 1500);
          currentFreq = smooth(currentFreq, targetFreq, SMOOTH);
          oscillator.frequency.linearRampToValueAtTime(currentFreq, now + rampTime);
        }

        if (leftY !== null) {
          const targetGain = mapRange(leftY, 1, 0, 0, 0.8);
          currentGain = smooth(currentGain, targetGain, SMOOTH);
        } else if (rightY !== null) {
          currentGain = smooth(currentGain, 0.4, SMOOTH);
        } else {
          currentGain = smooth(currentGain, 0, SMOOTH);
        }

        gainNode.gain.linearRampToValueAtTime(clamp(currentGain, 0, 0.8), now + rampTime);
      }

      // Info display
      if (leftY !== null) {
        const vol = Math.round(mapRange(leftY, 1, 0, 0, 100));
        leftInfo.textContent = '左手: 音量 ' + clamp(vol, 0, 100) + '%';
      } else {
        leftInfo.textContent = '左手: --';
      }

      if (rightY !== null) {
        rightInfo.textContent = '右手: ' + Math.round(currentFreq) + ' Hz';
      } else {
        rightInfo.textContent = '右手: --';
      }

      requestAnimationFrame(detect);
    }

    detect();

  } catch (e) {
    console.error(e);
    statusEl.textContent = '启动失败: ' + e.message;
    startBtn.disabled = false;
    startBtn.textContent = '开始演奏';
  }
});
</script>
</body>
</html>
